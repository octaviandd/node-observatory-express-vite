# End-to-end patcher verification.
# Runs the with-express server with real MySQL + Redis, exercises packages
# via /stress routes, then verifies entries landed in MySQL correctly.
#
# Usage:
#   docker compose -f tests/patcher-tests/docker-compose.patcher-test.yml up -d --build --wait
#   docker exec observatory-patcher-runner bash tests/patcher-tests/run-patcher-tests.sh --category cache

services:
  mysql-test:
    image: mysql:8.0
    container_name: observatory-patcher-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test_password
      MYSQL_DATABASE: observatory_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_password"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  redis-test:
    image: redis:7-alpine
    container_name: observatory-patcher-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  patcher-runner:
    build:
      context: ../../../../
      dockerfile: packages/api/tests/patcher-tests/Dockerfile
    container_name: observatory-patcher-runner
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-test
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: test_password
      MYSQL_DATABASE: observatory_test
      REDIS_URL: redis://redis-test:6379
      REDIS_HOST: redis-test
      REDIS_PORT: "6379"
      HTTP_TARGET: https://httpbin.org/get
      NODE_OPTIONS: "--max-old-space-size=512"
      TS_NODE_TRANSPILE_ONLY: "1"
    working_dir: /app
    command: ["tail", "-f", "/dev/null"]
